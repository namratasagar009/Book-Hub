<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | 99 Club</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        .auth-bg {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: var(--bg-dark);
            padding: 2rem;
        }

        .auth-card {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 16px;
            border: 1px solid var(--neon-blue);
            width: 100%;
            max-width: 400px;
            z-index: 10;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <div class="auth-bg">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="index.html" class="nav-logo">
                    <span class="logo-icon">⬡</span>
                    <span class="logo-text">99 <span class="logo-accent">Club</span></span>
                </a>
            </div>
            <h2 class="modal-title" style="margin-bottom: 1rem;">Welcome Back</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Login to access your winnings
            </p>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" class="form-input" placeholder="+91 xxxxxxxxxx">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-input" placeholder="••••••••">
            </div>

            <button class="btn btn-primary btn-full" onclick="location.href='index.html'">Login Now</button>

            <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="signup.html" class="neon-blue">Create one</a>
            </p>
        </div>
    </div>
</body>

</html>
